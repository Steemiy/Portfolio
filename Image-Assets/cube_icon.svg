<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%" style="background:transparent;">
  <defs>
    <linearGradient id="isoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#3b82f6" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="glowSmall" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <g stroke="rgba(255,255,255,0.04)" stroke-width="0.5">
    </g>

  <g stroke="url(#isoGradient)" stroke-width="1.5" fill="none" transform="translate(100,100)">
    <path d="M 150 0 L 300 75 L 150 150 L 0 75 Z" />
    <path d="M 0 75 L 0 225 L 150 300 L 150 150 Z" />
    <path d="M 150 150 L 150 300 L 300 225 L 300 75 Z" />
  </g>

  <g fill="#ffffff" filter="url(#glowSmall)">
    <circle cx="250" cy="175" r="5" />
    <circle cx="250" cy="325" r="5" />
    <circle cx="100" cy="250" r="4" />
    <circle cx="400" cy="250" r="4" />
    <circle cx="250" cy="25" r="4" />
  </g>
</svg>
