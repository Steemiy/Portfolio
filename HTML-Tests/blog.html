<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Journal // Tegameno Iyambo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', Courier, monospace; }
        body { background-color: #03020d; color: #ffffff; overflow: hidden; height: 100vh; }
        #space-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        
        /* Schematic Nodes */
        .node-l { position: absolute; top: 15%; left: 3%; width: 80px; height: 80px; z-index: 0; opacity: 0.2; pointer-events: none; }
        .node-r { position: absolute; bottom: 15%; right: 3%; width: 80px; height: 80px; z-index: 0; opacity: 0.2; pointer-events: none; }

        /* Full Screen Master Layout */
        .container {
            position: relative; z-index: 2; width: 95%; max-width: 1200px; margin: 3% auto;
            background: rgba(7, 5, 20, 0.9); border: 1px solid #a100ff; padding: 25px;
            height: 88vh; display: flex; flex-direction: column; overflow: hidden;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.05)),
                        rgba(7, 5, 20, 0.9);
            background-size: 100% 4px, 3px 100%, cover;
        }

        /* Tech Crosshair Corners */
        .container::before { content: ""; position: absolute; top: -5px; left: -5px; width: 20px; height: 20px; border-top: 2px solid #a100ff; border-left: 2px solid #a100ff; }
        .container::after { content: ""; position: absolute; bottom: -5px; right: -5px; width: 20px; height: 20px; border-bottom: 2px solid #a100ff; border-right: 2px solid #a100ff; }

        .scanner { position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: rgba(161, 0, 255, 0.2); z-index: 4; animation: move-scan 6s linear infinite; pointer-events: none; }
        @keyframes move-scan { 0% { top: 0; } 100% { top: 100%; } }

        .header-section { padding-bottom: 20px; border-bottom: 1px solid rgba(161, 0, 255, 0.2); margin-bottom: 20px; }
        .system-tag { font-size: 0.75rem; font-weight: 700; color: #00e5ff; letter-spacing: 2px; }
        
        /* Workspace Split Windows */
        .workspace-grid { display: flex; gap: 25px; flex-grow: 1; overflow: hidden; }
        
        /* Left Window Panel: Index */
        .journal-index-panel { width: 300px; display: flex; flex-direction: column; gap: 15px; }
        .panel-title-wrapper { display: inline-block; margin-bottom: 10px; }
        .panel-title { font-size: 0.9rem; font-weight: 800; color: #00e5ff; letter-spacing: 1px; }
        .panel-underline { height: 2px; background-color: #00e5ff; width: 100%; margin-top: 2px; }
        .directory-path { font-size: 0.75rem; color: #a5a5c0; margin-bottom: 10px; line-height: 1.4; }
        
        .index-stack { display: flex; flex-direction: column; gap: 10px; }
        .category-node { background: rgba(7, 5, 20, 0.5); border: 1px solid rgba(161, 0, 255, 0.3); color: #a5a5c0; padding: 12px; cursor: pointer; font-size: 0.75rem; border-radius: 8px; transition: all 0.2s ease; }
        .category-node:hover { border-color: #00e5ff; color: #ffffff; background: rgba(0, 229, 255, 0.03); }
        .category-node.active { border-color: #00e5ff; color: #00e5ff; background: rgba(0, 229, 255, 0.08); font-weight: bold; box-shadow: 0 0 10px rgba(0, 229, 255, 0.1); }

        /* Right Window Panel: Feed */
        .logs-feed-panel { flex-grow: 1; display: flex; flex-direction: column; }
        .feed-status-line { font-size: 0.75rem; color: #a5a5c0; margin-bottom: 15px; }
        
        #logs-stream { flex-grow: 1; overflow-y: auto; padding-right: 10px; }
        #logs-stream::-webkit-scrollbar { width: 4px; }
        #logs-stream::-webkit-scrollbar-track { background: #03020d; }
        #logs-stream::-webkit-scrollbar-thumb { background: #a100ff; }

        /* Article Log Cards */
        @keyframes item-reveal { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        .log-card { background: rgba(7, 5, 20, 0.8); border: 1px solid #a100ff; border-radius: 12px; padding: 20px; margin-bottom: 20px; animation: item-reveal 0.4s ease forwards; opacity: 0; transition: border-color 0.2s ease; }
        .log-card:hover { border-color: #ff7bf5; }
        
        .card-header { display: flex; justify-content: space-between; font-size: 0.75rem; margin-bottom: 12px; }
        .card-id { color: rgba(0, 229, 255, 0.6); }
        .card-category { color: #ff7bf5; font-weight: bold; }
        
        .card-title { font-size: 1rem; font-weight: 800; color: #ffffff; line-height: 1.4; margin-bottom: 14px; }
        
        .star-container { display: flex; flex-direction: column; gap: 6px; margin-bottom: 18px; }
        .star-line { font-size: 0.8rem; line-height: 1.5; color: #ffffff; }
        .star-tag { color: #00e5ff; font-weight: bold; }

        .card-actions { display: flex; gap: 12px; }
        .action-btn { background: transparent; border: 1px solid #00e5ff; color: #00e5ff; font-size: 0.75rem; font-weight: bold; padding: 6px 14px; border-radius: 6px; cursor: pointer; transition: all 0.2s ease; }
        .action-btn:hover { background: rgba(0, 229, 255, 0.1); box-shadow: 0 0 8px rgba(0, 229, 255, 0.2); }

        .return-link { margin-top: auto; padding-top: 15px; color: #a100ff; text-decoration:none; font-size: 0.8rem; display: inline-block; width: fit-content; }
        .return-link:hover { color: #ff7bf5; }
    </style>
</head>
<body>

    <canvas id="space-canvas"></canvas>

    <svg class="node-l" viewBox="0 0 100 100"><circle cx="50" cy="50" r="10" stroke="#a100ff" fill="none" stroke-width="2"/><line x1="50" y1="0" x2="50" y2="100" stroke="#a100ff" stroke-width="1"/><line x1="0" y1="50" x2="100" y2="50" stroke="#a100ff" stroke-width="1"/></svg>
    <svg class="node-r" viewBox="0 0 100 100"><rect x="30" y="30" width="40" height="40" stroke="#00e5ff" fill="none" stroke-width="2"/><circle cx="50" cy="50" r="5" fill="#00e5ff"/></svg>

    <div class="container">
        <div class="scanner"></div>
        
        <div class="header-section">
            <div class="system-tag">SYSTEM_STATUS: ONLINE // SUB_SECTOR: /JOURNAL_ARCHIVE</div>
        </div>

        <div class="workspace-grid">
            <div class="journal-index-panel">
                <div>
                    <div class="panel-title-wrapper">
                        <div class="panel-title">JOURNAL_INDEX</div>
                        <div class="panel-underline"></div>
                    </div>
                    <div class="directory-path">> ROOT // TECHNICAL_LOGS /</div>
                </div>
                
                <div class="index-stack" id="category-stack">
                    <div class="category-node active" onclick="switchCategory('all', this)">> ALL CATEGORIES</div>
                    <div class="category-node" onclick="switchCategory('flet', this)">  PYTHON_FLET (2)</div>
                    <div class="category-node" onclick="switchCategory('pandas', this)">  PYTHON_PANDAS (2)</div>
                </div>

                <a href="main-page.html" class="return-link">[RETURN TO MATRIX]</a>
            </div>

            <div class="logs-feed-panel">
                <div>
                    <div class="panel-title-wrapper">
                        <div class="panel-title">LOGS_FEED</div>
                        <div class="panel-underline"></div>
                    </div>
                    <div class="feed-status-line">DISPLAYING_MOST_RECENT_LOGS...</div>
                </div>

                <div id="logs-stream"></div>
            </div>
        </div>
    </div>

    <script>
        const blogData = [
            {
                id: "01",
                title: "BUILDING NATIVE ASYNCHRONOUS UIs IN PYTHON // AN INTRODUCTION TO FLET",
                cat: "flet",
                catLabel: "PYTHON_FLET",
                situation: "Traditional Python GUI frameworks require complex event loops and look completely outdated.",
                solution: "Leverage Flet's underlying Flutter architecture to build state-driven reactive views using clean pythonic async/await loops.",
                outcome: "Rendered a high-fidelity system terminal workspace executing UI state switches seamlessly with zero multi-threading boilerplate."
            },
            {
                id: "02",
                title: "DATA DISSECTION WITH VECTORIZED MATRICES // PANDAS CORE MECHANICS",
                cat: "pandas",
                catLabel: "PYTHON_PANDAS",
                situation: "Using standard Python for-loops to clean or parse massive arrays tanks runtime execution speeds.",
                solution: "Utilize Pandas DataFrames to offload element-wise mathematical calculations directly to optimized, vectorized C-arrays under the hood.",
                outcome: "Processed raw data sweeps instantly, dropping structural data manipulation latency down to millisecond thresholds."
            },
            {
                id: "03",
                title: "MASTERING RESPONSIVE LAYOUT ENGINES // FLET CONTAINMENT STRUCTURES",
                cat: "flet",
                catLabel: "PYTHON_FLET",
                situation: "Hardcoded UI canvas positions break application design layouts when scaled across different monitor viewports.",
                solution: "Implement flexible grid architectures combining 'ft.Row', 'ft.Column', and precise nested container alignment properties.",
                outcome: "Achieved a clean, fluid interface matrix that dynamically balances space whether running full-screen or as a docked module."
            },
            {
                id: "04",
                title: "LOGICAL MASKING AND DATA FILTERS // PANDAS CONDITIONAL SUBSETS",
                cat: "pandas",
                catLabel: "PYTHON_PANDAS",
                situation: "Sifting through specific multi-variable parameters within dense records via conditional branches creates heavy, unreadable code blocks.",
                solution: "Apply vectorized boolean indexing masks to slice through multi-dimensional DataFrames in a single declarative line.",
                outcome: "Assembled clean, high-performance query logic capable of pulling specific target metrics from thousands of records instantly."
            }
        ];

        const stream = document.getElementById('logs-stream');

        function renderLogs(filter = 'all') {
            stream.innerHTML = '';
            let renderingIndex = 1;
            
            blogData.forEach((post) => {
                if(filter === 'all' || post.cat === filter) {
                    const card = document.createElement('div');
                    card.className = 'log-card';
                    card.style.animationDelay = `${renderingIndex * 0.08}s`;
                    
                    card.innerHTML = `
                        <div class="card-header">
                            <span class="card-id">DECRYPTION_KEY: JOURNAL_REF_#${post.id}</span>
                            <span class="card-category">> Category: ${post.catLabel}</span>
                        </div>
                        <h3 class="card-title">${post.title}</h3>
                        <div class="star-container">
                            <div class="star-line"><span class="star-tag">> Situation:</span> ${post.situation}</div>
                            <div class="star-line"><span class="star-tag">> Solution:</span> ${post.solution}</div>
                            <div class="star-line"><span class="star-tag">> Outcome:</span> ${post.outcome}</div>
                        </div>
                        <div class="card-actions">
                            <button class="action-btn">[DECRYPT_ARTICLE]</button>
                            <button class="action-btn">[CODEBASE_REFERENCE]</button>
                        </div>
                    `;
                    stream.appendChild(card);
                    renderingIndex++;
                }
            });
        }
        
        function switchCategory(cat, element) {
            document.querySelectorAll('.category-node').forEach(node => node.classList.remove('active'));
            element.classList.add('active');
            renderLogs(cat);
        }

        // Initialize Feed
        renderLogs();

        // Background Star Animation
        const canvas = document.getElementById('space-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const stars = Array.from({length: 80}, () => ({x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*1.2}));
        
        function animate() {
            ctx.clearRect(0,0, canvas.width, canvas.height);
            ctx.fillStyle = "rgba(255, 255, 255, 0.7)";
            stars.forEach(s => { 
                ctx.beginPath(); 
                ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); 
                ctx.fill(); 
                s.x -= 0.08; 
                if(s.x < 0) s.x = canvas.width; 
            });
            requestAnimationFrame(animate);
        }
        animate();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
